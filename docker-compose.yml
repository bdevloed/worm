services:
  caddy:
    image: caddy:2-alpine
    container_name: worm-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ${HOME}/.cache/worm/sockets:/sockets
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
